<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="50%" stop-color="#0f1520"/>
      <stop offset="100%" stop-color="#0a0e17"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="gridFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1e293b" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="roundClip">
      <rect width="900" height="280" rx="6"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundClip)">
    <!-- Background -->
    <rect width="900" height="280" fill="url(#bg)"/>

    <!-- Subtle grid -->
    <g stroke="url(#gridFade)" stroke-width="0.4">
      <line x1="150" y1="0" x2="150" y2="280"/>
      <line x1="300" y1="0" x2="300" y2="280"/>
      <line x1="450" y1="0" x2="450" y2="280"/>
      <line x1="600" y1="0" x2="600" y2="280"/>
      <line x1="750" y1="0" x2="750" y2="280"/>
      <line x1="0" y1="70" x2="900" y2="70"/>
      <line x1="0" y1="140" x2="900" y2="140"/>
      <line x1="0" y1="210" x2="900" y2="210"/>
    </g>

    <!-- Decorative dots at grid intersections -->
    <g fill="#3b82f6" opacity="0.25">
      <circle cx="150" cy="70" r="2"/>
      <circle cx="300" cy="140" r="2"/>
      <circle cx="450" cy="70" r="2"/>
      <circle cx="600" cy="210" r="2"/>
      <circle cx="750" cy="140" r="2"/>
      <circle cx="300" cy="70" r="1.5"/>
      <circle cx="600" cy="70" r="1.5"/>
      <circle cx="150" cy="210" r="1.5"/>
      <circle cx="450" cy="210" r="1.5"/>
      <circle cx="750" cy="70" r="1.5"/>
    </g>

    <!-- Candlestick chart decoration (left side) -->
    <g opacity="0.12" stroke-width="1.2">
      <!-- candle bodies -->
      <rect x="60" y="120" width="6" height="40" fill="#22c55e" rx="1"/>
      <line x1="63" y1="110" x2="63" y2="120" stroke="#22c55e"/>
      <line x1="63" y1="160" x2="63" y2="170" stroke="#22c55e"/>

      <rect x="80" y="100" width="6" height="50" fill="#ef4444" rx="1"/>
      <line x1="83" y1="90" x2="83" y2="100" stroke="#ef4444"/>
      <line x1="83" y1="150" x2="83" y2="165" stroke="#ef4444"/>

      <rect x="100" y="130" width="6" height="30" fill="#22c55e" rx="1"/>
      <line x1="103" y1="118" x2="103" y2="130" stroke="#22c55e"/>
      <line x1="103" y1="160" x2="103" y2="172" stroke="#22c55e"/>

      <rect x="120" y="105" width="6" height="45" fill="#22c55e" rx="1"/>
      <line x1="123" y1="92" x2="123" y2="105" stroke="#22c55e"/>
      <line x1="123" y1="150" x2="123" y2="160" stroke="#22c55e"/>

      <rect x="140" y="115" width="6" height="35" fill="#ef4444" rx="1"/>
      <line x1="143" y1="105" x2="143" y2="115" stroke="#ef4444"/>
      <line x1="143" y1="150" x2="143" y2="162" stroke="#ef4444"/>
    </g>

    <!-- RSI wave decoration (right side) -->
    <path d="M700,170 Q720,130 740,155 Q760,180 780,140 Q800,100 820,145 Q840,190 860,150"
          fill="none" stroke="#3b82f6" stroke-width="1.2" opacity="0.15"/>
    <line x1="700" y1="145" x2="860" y2="145" stroke="#60a5fa" stroke-width="0.5" opacity="0.1" stroke-dasharray="3,3"/>

    <!-- Code snippet decoration (right) -->
    <g opacity="0.08" font-family="monospace" font-size="10" fill="#94a3b8">
      <text x="680" y="60">strategy rsi_divergence {</text>
      <text x="695" y="74">param period = 14</text>
      <text x="695" y="88">param threshold = 0.72</text>
      <text x="680" y="102">}</text>
    </g>

    <!-- Accent line -->
    <rect x="350" y="108" width="50" height="3" fill="url(#accent)" rx="1.5"/>

    <!-- Title -->
    <text x="450" y="100" text-anchor="middle"
          font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', monospace"
          font-size="52" font-weight="700" fill="#f8fafc" letter-spacing="6">OCTURN</text>

    <!-- Subtitle -->
    <text x="450" y="138" text-anchor="middle"
          font-family="'Inter', 'Segoe UI', system-ui, sans-serif"
          font-size="13" fill="#64748b" letter-spacing="4" font-weight="400">SYSTEMATIC BACKTESTING ENGINE</text>

    <!-- Stats row -->
    <g font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" text-anchor="middle">
      <!-- Profit Factor -->
      <text x="270" y="192" font-size="22" font-weight="600" fill="#f1f5f9">2.14</text>
      <text x="270" y="210" font-size="9" fill="#475569" letter-spacing="2" font-family="'Inter', sans-serif">PROFIT FACTOR</text>

      <!-- Sharpe -->
      <text x="370" y="192" font-size="22" font-weight="600" fill="#f1f5f9">1.87</text>
      <text x="370" y="210" font-size="9" fill="#475569" letter-spacing="2" font-family="'Inter', sans-serif">SHARPE RATIO</text>

      <!-- Win Rate -->
      <text x="470" y="192" font-size="22" font-weight="600" fill="#f1f5f9">64.2<tspan font-size="13" fill="#64748b">%</tspan></text>
      <text x="470" y="210" font-size="9" fill="#475569" letter-spacing="2" font-family="'Inter', sans-serif">WIN RATE</text>

      <!-- Latency -->
      <text x="570" y="192" font-size="22" font-weight="600" fill="#f1f5f9">&lt;1<tspan font-size="13" fill="#64748b">ms</tspan></text>
      <text x="570" y="210" font-size="9" fill="#475569" letter-spacing="2" font-family="'Inter', sans-serif">MEDIAN LATENCY</text>

      <!-- Funded -->
      <text x="670" y="192" font-size="22" font-weight="600" fill="#22c55e">100K</text>
      <text x="670" y="210" font-size="9" fill="#475569" letter-spacing="2" font-family="'Inter', sans-serif">FUNDED</text>
    </g>

    <!-- Tech tags -->
    <g font-family="'SF Mono', 'Fira Code', monospace" font-size="10" text-anchor="middle">
      <rect x="230" y="235" width="65" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
      <text x="262.5" y="250" fill="#94a3b8">C++20</text>

      <rect x="310" y="235" width="100" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
      <text x="360" y="250" fill="#94a3b8">Custom DSL</text>

      <rect x="425" y="235" width="115" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
      <text x="482.5" y="250" fill="#94a3b8">Deterministic</text>

      <rect x="555" y="235" width="90" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
      <text x="600" y="250" fill="#94a3b8">Polygon API</text>

      <rect x="660" y="235" width="55" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
      <text x="687.5" y="250" fill="#94a3b8">MIT</text>
    </g>

    <!-- Top-left terminal dot decoration -->
    <g>
      <circle cx="32" cy="22" r="5" fill="#ef4444" opacity="0.7"/>
      <circle cx="48" cy="22" r="5" fill="#eab308" opacity="0.7"/>
      <circle cx="64" cy="22" r="5" fill="#22c55e" opacity="0.7"/>
    </g>
  </g>
</svg>
